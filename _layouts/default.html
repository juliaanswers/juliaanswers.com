<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: { 50: '#f6f7f4', 100: '#e8eae2', 200: '#d2d6c7', 300: '#b3baa3', 400: '#939d7e', 500: '#778263', 600: '#5d674d', 700: '#49503d', 800: '#3c4234', 900: '#34392e' },
            amber: { 50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d', 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309', 800: '#92400e', 900: '#78350f' },
            warmgray: { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1', 400: '#a8a29e', 500: '#78716c', 600: '#57534e', 700: '#44403c', 800: '#292524', 900: '#1c1917' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Georgia', 'Times New Roman', serif; }
    h1, h2, h3, h4, h5, h6 { font-family: system-ui, -apple-system, sans-serif; }
    .font-sans { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-warmgray-50 text-warmgray-800">
  {{ content }}
</body>
</html>
